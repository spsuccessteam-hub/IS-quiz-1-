<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IndigoSol — What's Your Relationship With Time For Yourself?</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Cinzel:wght@400;500;600&family=Dancing+Script:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --blush: #F5EBEC;
    --rose: #E8D3CB;
    --petal: #FDCDCD;
    --lavender: #F9F3F7;
    --cream: #FCFDF7;
    --gold: #C9A96E;
    --gold-deep: #A8834A;
    --gold-light: #E8D5A3;
    --mauve: #D4A8A8;
    --text-dark: #5C4A4A;
    --text-mid: #8B6F6F;
    --text-light: #B89A9A;
  }

- { margin: 0; padding: 0; box-sizing: border-box; -webkit-text-fill-color: inherit; }

button { -webkit-appearance: none; appearance: none; }

body {
font-family: ‘Cormorant Garamond’, serif;
background: var(–cream);
min-height: 100vh;
overflow-x: hidden;
color: var(–text-dark) !important;
-webkit-text-fill-color: var(–text-dark) !important;
}

.bg-wash {
position: fixed;
inset: 0;
z-index: 0;
background:
radial-gradient(ellipse 80% 60% at 20% 20%, rgba(253,205,205,0.45) 0%, transparent 60%),
radial-gradient(ellipse 60% 70% at 80% 10%, rgba(249,243,247,0.6) 0%, transparent 55%),
radial-gradient(ellipse 70% 50% at 60% 80%, rgba(232,211,203,0.35) 0%, transparent 60%),
radial-gradient(ellipse 50% 60% at 10% 70%, rgba(245,235,236,0.5) 0%, transparent 55%),
linear-gradient(160deg, #FDF0F0 0%, #F9F3F7 40%, #F5EBEC 70%, #FCFDF7 100%);
}

.stars {
position: fixed;
inset: 0;
z-index: 0;
pointer-events: none;
}

.star {
position: absolute;
color: var(–gold) !important;
-webkit-text-fill-color: var(–gold) !important;
animation: twinkle 3s ease-in-out infinite;
opacity: 0;
}

@keyframes twinkle {
0%, 100% { opacity: 0; transform: scale(0.8); }
50% { opacity: 0.6; transform: scale(1.1); }
}

.petal-deco {
position: fixed;
pointer-events: none;
z-index: 0;
font-size: 20px;
opacity: 0.1;
animation: drift 8s ease-in-out infinite;
}

@keyframes drift {
0%, 100% { transform: rotate(-5deg) translateY(0); }
50% { transform: rotate(5deg) translateY(-12px); }
}

.container {
position: relative;
z-index: 1;
max-width: 680px;
margin: 0 auto;
padding: 40px 24px 80px;
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
}

/* Header */
.header {
text-align: center;
margin-bottom: 44px;
animation: fadeUp 1s ease forwards;
}

.brand-name {
font-family: ‘Cinzel’, serif;
font-size: clamp(26px, 6vw, 42px);
font-weight: 500;
color: var(–gold) !important;
-webkit-text-fill-color: var(–gold) !important;
letter-spacing: 0.15em;
margin-bottom: 4px;
}

.brand-script {
font-family: ‘Dancing Script’, cursive;
font-size: clamp(15px, 3.5vw, 21px);
color: var(–text-mid) !important;
-webkit-text-fill-color: var(–text-mid) !important;
font-weight: 400;
margin-bottom: 28px;
display: block;
}

.divider {
display: flex;
align-items: center;
gap: 12px;
justify-content: center;
margin: 16px 0;
}

.divider-line {
width: 50px;
height: 1px;
background: linear-gradient(90deg, transparent, var(–gold), transparent);
}

.divider-star { color: var(–gold); font-size: 13px; }

/* Progress */
.progress-wrap {
width: 100%;
max-width: 500px;
margin-bottom: 32px;
}

.progress-label {
font-family: ‘Dancing Script’, cursive;
color: var(–gold) !important;
-webkit-text-fill-color: var(–gold) !important;
font-size: 16px;
text-align: center;
margin-bottom: 10px;
}

.progress-bar-bg {
width: 100%;
height: 3px;
background: rgba(201,169,110,0.18);
border-radius: 10px;
overflow: hidden;
}

.progress-bar-fill {
height: 100%;
background: linear-gradient(90deg, var(–rose), var(–gold));
border-radius: 10px;
transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

/* Card */
.card {
width: 100%;
max-width: 560px;
background: rgba(252,253,247,0.88);
backdrop-filter: blur(14px);
border: 1px solid rgba(201,169,110,0.2);
border-radius: 26px;
padding: clamp(28px, 6vw, 50px);
box-shadow:
0 4px 32px rgba(200,160,160,0.12),
0 1px 0 rgba(255,255,255,0.85) inset;
animation: fadeUp 0.6s ease forwards;
}

.question-number {
font-family: ‘Dancing Script’, cursive;
color: var(–gold) !important;
-webkit-text-fill-color: var(–gold) !important;
font-size: 16px;
margin-bottom: 14px;
display: block;
}

.question-text {
font-size: clamp(19px, 4vw, 27px);
font-weight: 400;
font-style: italic;
color: var(–text-dark) !important;
-webkit-text-fill-color: var(–text-dark) !important;
line-height: 1.4;
margin-bottom: 28px;
}

/* Options */
.options {
display: flex;
flex-direction: column;
gap: 11px;
}

.option {
display: flex;
align-items: flex-start;
gap: 14px;
padding: 15px 18px;
border: 1.5px solid rgba(201,169,110,0.2);
border-radius: 14px;
background: rgba(245,235,236,0.25);
cursor: pointer;
transition: all 0.3s ease;
text-align: left;
width: 100%;
font-family: ‘Cormorant Garamond’, serif;
color: var(–text-mid) !important;
-webkit-text-fill-color: var(–text-mid) !important;
user-select: none;
}

.option:hover {
border-color: rgba(201,169,110,0.6);
background: rgba(245,235,236,0.55);
transform: translateX(4px);
box-shadow: 0 3px 16px rgba(200,160,160,0.14);
}

.option.selected {
border-color: var(–gold) !important;
-webkit-text-fill-color: var(–gold) !important;
background: linear-gradient(135deg, rgba(245,235,236,0.75), rgba(249,243,247,0.75));
box-shadow: 0 4px 20px rgba(200,160,160,0.18);
}

.option-dot {
width: 20px;
height: 20px;
min-width: 20px;
border-radius: 50%;
border: 1.5px solid rgba(201,169,110,0.35);
margin-top: 2px;
display: flex;
align-items: center;
justify-content: center;
transition: all 0.3s ease;
background: transparent;
}

.option.selected .option-dot {
background: var(–gold);
border-color: var(–gold) !important;
-webkit-text-fill-color: var(–gold) !important;
}

.option.selected .option-dot::after {
content: ‘✦’;
color: white !important;
-webkit-text-fill-color: white !important;
font-size: 9px;
}

.option-text {
font-size: clamp(15px, 2.8vw, 17px);
color: var(–text-mid) !important;
-webkit-text-fill-color: var(–text-mid) !important;
line-height: 1.55;
font-weight: 400;
}

button {
-webkit-appearance: none;
appearance: none;
}

/* Nav */
.nav-wrap {
display: flex;
justify-content: space-between;
align-items: center;
margin-top: 28px;
width: 100%;
max-width: 560px;
}

.btn-back {
font-family: ‘Dancing Script’, cursive;
font-size: 17px;
color: var(–text-light) !important;
-webkit-text-fill-color: var(–text-light) !important;
background: none;
border: none;
cursor: pointer;
padding: 8px 0;
transition: color 0.3s ease;
}

.btn-back:hover { color: var(–gold); }

.btn-next {
font-family: ‘Cinzel’, serif;
font-size: 12px;
letter-spacing: 0.13em;
color: white !important;
-webkit-text-fill-color: white !important;
background: linear-gradient(135deg, #B08080, #8B6340);
border: none;
border-radius: 50px;
padding: 14px 34px;
cursor: pointer;
transition: all 0.3s ease;
box-shadow: 0 4px 20px rgba(150,100,80,0.35);
}

.btn-next:hover {
transform: translateY(-2px);
box-shadow: 0 7px 26px rgba(200,160,160,0.38);
}

.btn-next:disabled {
opacity: 0.35;
cursor: not-allowed;
transform: none;
box-shadow: none;
}

/* Intro */
.intro-icon {
font-size: 34px;
margin-bottom: 18px;
display: block;
color: var(–gold) !important;
-webkit-text-fill-color: var(–gold) !important;
animation: float 4s ease-in-out infinite;
}

@keyframes float {
0%, 100% { transform: translateY(0); }
50% { transform: translateY(-8px); }
}

.intro-title {
font-size: clamp(21px, 4.5vw, 31px);
font-weight: 400;
font-style: italic;
color: var(–text-dark) !important;
-webkit-text-fill-color: var(–text-dark) !important;
line-height: 1.35;
margin-bottom: 20px;
}

.intro-body {
font-size: clamp(15px, 3vw, 18px);
color: var(–text-mid) !important;
-webkit-text-fill-color: var(–text-mid) !important;
line-height: 1.9;
font-weight: 300;
margin-bottom: 12px;
}

.intro-note {
font-family: ‘Dancing Script’, cursive;
font-size: 17px;
color: var(–gold) !important;
-webkit-text-fill-color: var(–gold) !important;
margin-bottom: 32px;
display: block;
}

.btn-start {
font-family: ‘Cinzel’, serif;
font-size: 12px;
letter-spacing: 0.15em;
color: white !important;
-webkit-text-fill-color: white !important;
background: linear-gradient(135deg, var(–mauve), var(–gold));
border: none;
border-radius: 50px;
padding: 16px 52px;
cursor: pointer;
transition: all 0.3s ease;
box-shadow: 0 4px 24px rgba(200,160,160,0.32);
}

.btn-start:hover {
transform: translateY(-2px);
box-shadow: 0 8px 30px rgba(200,160,160,0.42);
}

/* Result card */
.result-card {
width: 100%;
max-width: 560px;
background: rgba(252,253,247,0.92);
backdrop-filter: blur(16px);
border: 1px solid rgba(201,169,110,0.22);
border-radius: 28px;
padding: clamp(36px, 7vw, 58px);
box-shadow: 0 8px 48px rgba(200,160,160,0.16);
text-align: center;
animation: fadeUp 0.8s ease forwards;
}

.result-eyebrow {
font-family: ‘Dancing Script’, cursive;
color: var(–gold) !important;
-webkit-text-fill-color: var(–gold) !important;
font-size: 18px;
margin-bottom: 8px;
display: block;
}

.result-era {
font-family: ‘Cinzel’, serif;
font-size: clamp(22px, 5vw, 34px);
font-weight: 600;
color: var(–gold-deep) !important;
-webkit-text-fill-color: var(–gold-deep) !important;
line-height: 1.2;
margin-bottom: 8px;
}

.result-tagline {
font-family: ‘Cormorant Garamond’, serif;
font-size: clamp(15px, 3vw, 19px);
font-style: italic;
color: var(–text-mid) !important;
-webkit-text-fill-color: var(–text-mid) !important;
margin-bottom: 24px;
}

.result-message {
font-size: clamp(15px, 2.8vw, 18px);
color: var(–text-dark) !important;
-webkit-text-fill-color: var(–text-dark) !important;
line-height: 1.9;
font-weight: 300;
margin-bottom: 32px;
text-align: left;
}

/* Suggestions box */
.suggestions-box {
background: linear-gradient(135deg, rgba(245,235,236,0.5), rgba(249,243,247,0.5));
border: 1px solid rgba(201,169,110,0.2);
border-radius: 18px;
padding: 28px 28px;
margin-bottom: 32px;
text-align: left;
}

.suggestions-title {
font-family: ‘Cinzel’, serif;
font-size: 12px;
letter-spacing: 0.12em;
color: var(–gold) !important;
-webkit-text-fill-color: var(–gold) !important;
margin-bottom: 20px;
display: block;
text-align: center;
}

.suggestion-item {
display: flex;
gap: 12px;
margin-bottom: 16px;
align-items: flex-start;
}

.suggestion-item:last-child { margin-bottom: 0; }

.suggestion-star {
color: var(–gold) !important;
-webkit-text-fill-color: var(–gold) !important;
font-size: 13px;
margin-top: 3px;
min-width: 14px;
}

.suggestion-text {
font-size: clamp(14px, 2.6vw, 16px);
color: var(–text-mid) !important;
-webkit-text-fill-color: var(–text-mid) !important;
line-height: 1.7;
font-weight: 300;
}

.suggestion-label {
font-family: ‘Cinzel’, serif;
font-size: 11px;
letter-spacing: 0.1em;
color: var(–gold) !important;
-webkit-text-fill-color: var(–gold) !important;
font-weight: 600;
display: block;
margin-bottom: 3px;
}

/* Invitation — the hero moment */
.invitation-wrap {
margin-bottom: 28px;
padding: 32px 28px;
background: linear-gradient(135deg, rgba(201,169,110,0.08), rgba(232,211,203,0.15));
border: 1.5px solid rgba(201,169,110,0.3);
border-radius: 18px;
}

.invitation-text {
font-family: ‘Cormorant Garamond’, serif;
font-size: clamp(19px, 4vw, 26px);
font-weight: 600;
font-style: italic;
color: var(–gold-deep) !important;
-webkit-text-fill-color: var(–gold-deep) !important;
line-height: 1.6;
margin-bottom: 0;
text-align: center;
}

.btn-subscribe {
font-family: ‘Cinzel’, serif;
font-size: 13px;
letter-spacing: 0.15em;
color: white !important;
-webkit-text-fill-color: white !important;
background: linear-gradient(135deg, var(–mauve), var(–gold));
border: none;
border-radius: 50px;
padding: 18px 44px;
cursor: pointer;
transition: all 0.3s ease;
box-shadow: 0 4px 24px rgba(200,160,160,0.35);
display: block;
width: 100%;
margin-bottom: 14px;
text-decoration: none;
text-align: center;
}

.btn-subscribe:hover {
transform: translateY(-2px);
box-shadow: 0 8px 32px rgba(200,160,160,0.45);
}

.btn-retake {
font-family: ‘Dancing Script’, cursive;
font-size: 17px;
color: var(–text-light) !important;
-webkit-text-fill-color: var(–text-light) !important;
background: none;
border: none;
cursor: pointer;
transition: color 0.3s ease;
display: block;
width: 100%;
text-align: center;
padding: 8px;
}

.btn-retake:hover { color: var(–gold); }

/* Footer */
.footer {
margin-top: 44px;
text-align: center;
}

.footer p {
font-family: ‘Dancing Script’, cursive;
color: var(–text-light) !important;
-webkit-text-fill-color: var(–text-light) !important;
font-size: 16px;
}

.footer .star-row {
color: var(–gold) !important;
-webkit-text-fill-color: var(–gold) !important;
font-size: 11px;
letter-spacing: 6px;
margin-top: 8px;
opacity: 0.55;
}

@keyframes fadeUp {
from { opacity: 0; transform: translateY(22px); }
to { opacity: 1; transform: translateY(0); }
}

.fade-enter { animation: fadeUp 0.5s ease forwards; }
</style>

</head>
<body>

<div class="bg-wash"></div>
<div class="stars" id="stars"></div>

<div class="petal-deco" style="top:6%; left:3%; animation-delay:0s;">🌸</div>
<div class="petal-deco" style="top:22%; right:2%; animation-delay:2.5s;">🌸</div>
<div class="petal-deco" style="bottom:22%; left:2%; animation-delay:4s;">🌸</div>
<div class="petal-deco" style="bottom:6%; right:4%; animation-delay:1.5s;">🌸</div>

<div class="container">

  <div class="header">
    <div class="brand-name">Indigo Sol</div>
    <span class="brand-script">sent with love</span>
    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-star">✦</span>
      <div class="divider-line"></div>
    </div>
  </div>

  <div id="quiz-content" style="width:100%; display:flex; flex-direction:column; align-items:center; gap:22px;"></div>

  <div class="footer">
    <p>Because YOUR life deserves to be romanticised</p>
    <div class="star-row">✦ ✦ ✦</div>
  </div>

</div>

<script>
  // Stars
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 26; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.innerHTML = ['✦','✧','⋆','✦'][Math.floor(Math.random()*4)];
    s.style.left = Math.random()*100+'%';
    s.style.top = Math.random()*100+'%';
    s.style.animationDelay = Math.random()*4+'s';
    s.style.animationDuration = (2.5+Math.random()*3)+'s';
    s.style.fontSize = (7+Math.random()*8)+'px';
    starsEl.appendChild(s);
  }

  const questions = [
    {
      text: "Be honest. When you finally get a moment to yourself, what actually happens?",
      options: [
        { text: "I pick up my phone. I tell myself just five minutes. Then suddenly it is an hour later and I am not even sure what I looked at.", type: "scroll" },
        { text: "I put something on in the background, a show, YouTube, anything, because silence feels uncomfortable.", type: "almost" },
        { text: "I start doing something for myself then remember something I forgot to do for someone else and go do that instead.", type: "trying" },
        { text: "I actually stop. Not perfectly, but I am getting better at actually being in the moment.", type: "rising" }
      ]
    },
    {
      text: "When someone asks if you make time for yourself, your honest inner response is...",
      options: [
        { text: "A small laugh. Time for myself? I am just trying to get through the day.", type: "scroll" },
        { text: "I do, kind of. Does watching TV count? I hope it counts.", type: "almost" },
        { text: "I want to. I keep almost doing it. I have a whole vision of what it would look like.", type: "trying" },
        { text: "Yes, actually. I have made it a priority even when it is imperfect and brief.", type: "rising" }
      ]
    },
    {
      text: "Your phone is in your hand. You open an app without even deciding to. Which one is it?",
      options: [
        { text: "Instagram or TikTok. I am not even looking for anything. I am just scrolling.", type: "scroll" },
        { text: "YouTube. I tell myself I am relaxing but I am not really switching off.", type: "almost" },
        { text: "My messages. Someone probably needs something. I should check.", type: "trying" },
        { text: "Honestly I have been trying to put it down more. Some days are better than others.", type: "rising" }
      ]
    },
    {
      text: "The last time you did something purely for yourself, just because it felt good, was...",
      options: [
        { text: "I genuinely cannot remember. Does eating lunch count?", type: "scroll" },
        { text: "A while ago. I think about it though. I have plans. I just have not started yet.", type: "almost" },
        { text: "Recently but I felt guilty about it the whole time so I am not sure it counts.", type: "trying" },
        { text: "Not that long ago actually. And it reminded me why it matters.", type: "rising" }
      ]
    },
    {
      text: "When you imagine having a slow intentional moment for yourself, what comes up first?",
      options: [
        { text: "A vague fantasy. Like a different version of my life that feels very far away.", type: "scroll" },
        { text: "It sounds nice. I just do not know where I would fit it in.", type: "almost" },
        { text: "I want it badly. I just keep waiting for life to calm down first.", type: "trying" },
        { text: "I have started claiming those moments. They do not have to be perfect to count.", type: "rising" }
      ]
    },
    {
      text: "What would it actually mean to romanticise your life right now, honestly?",
      options: [
        { text: "Probably just putting the phone down for long enough to remember I exist outside of it.", type: "scroll" },
        { text: "Doing something intentional instead of something passive. Choosing presence over background noise.", type: "almost" },
        { text: "Stopping waiting for permission. Doing the thing without guilt for once.", type: "trying" },
        { text: "Leaning further in. I have had a taste of it and I want more.", type: "rising" }
      ]
    }
  ];

  const results = {
    scroll: {
      era: "The Scroll & Scroll Again",
      tagline: "you are ready for something that actually fills you up",
      message: "You have been giving so much, to everyone, to everything, and when you finally get a moment the easiest thing is to disappear into the scroll. It makes sense. It asks nothing of you. But somewhere underneath that you already know there is something more nourishing waiting. You can feel it. That quiet pull toward something that actually lands, something that feels like it was made for this moment. That feeling is worth following.",
      suggestions: [
        { label: "BE STILL", text: "Make something warm and sit with it for ten minutes. Phone face down. No agenda. Just you and the quiet." },
        { label: "MOVE", text: "Take a gentle walk. Put something soft and slow on or simply walk in the quiet and let your thoughts breathe." },
        { label: "REFLECT", text: "Tonight write one sentence about how you actually feel. Not how you should feel. How you actually feel." }
      ],
      invitation: "And when you are ready for your own monthly moment, something beautiful written for your unique energy, to sit with slowly, and to remind you that you are seen, guided and loved..."
    },
    almost: {
      era: "The Almost There",
      tagline: "you are closer than you think",
      message: "You have the vision. You know what a slower more intentional life feels like in your imagination and you want it. That wanting is a living thing inside you. It is real and it is leading you somewhere. Life keeps filling up but the pull toward something more meaningful keeps pulling back. That is your soul telling you something worth listening to. You are already on your way.",
      suggestions: [
        { label: "BE STILL", text: "Choose one ordinary moment today and make it intentional. Light a candle while you make your coffee. Sit by a window. Give that moment your full attention." },
        { label: "MOVE", text: "Take a gentle walk. Put something soft and slow on or simply walk in the quiet and let your thoughts breathe." },
        { label: "REFLECT", text: "Ask yourself this question and sit with it. What would I do with thirty minutes today if I truly believed I deserved them?" }
      ],
      invitation: "And when you are ready for your own monthly moment, something beautiful written for your unique energy, to sit with slowly, and to remind you that you are seen, guided and loved..."
    },
    trying: {
      era: "The Beautifully Trying",
      tagline: "you are someone who shows up, even when it is hard",
      message: "You are making the effort. You carve out the time, you set the intention, and even when life pulls you back in you try again. That is not nothing. That is everything. The trying is the practice. The imperfect candle lit between messages, the journal opened for five minutes, the moment claimed even when it does not look the way you imagined. You are building something real and beautiful even when it does not feel that way yet.",
      suggestions: [
        { label: "BE STILL", text: "The next time you sit down for yourself, leave the guilt at the door. You do not have to earn this. Put something calming on, close your eyes for five minutes, and just breathe." },
        { label: "MOVE", text: "Take a gentle walk. Put something soft and slow on or simply walk in the quiet and let your thoughts breathe." },
        { label: "REFLECT", text: "Write down one thing you did this week just for yourself, no matter how small. Then write why it mattered. Because it did." }
      ],
      invitation: "And when you are ready for your own monthly moment, something beautiful written for your unique energy, to sit with slowly, and to remind you that you are seen, guided and loved..."
    },
    rising: {
      era: "The Romanticiser Rising",
      tagline: "you are already living it and it looks beautiful on you",
      message: "You have done something quietly powerful. You have made real moments for yourself and you know what it feels like to be present in your own life. That feeling is yours and you want more of it. More depth, more meaning, more moments that feel chosen and intentional and truly alive. You already know this matters. You have felt it. And now you are ready to go deeper into it.",
      suggestions: [
        { label: "BE STILL", text: "Create one moment this week that is entirely yours. Not productive. Not useful. Just beautiful. A bath, a book, a long breakfast. Claim it without explanation." },
        { label: "MOVE", text: "Take a gentle walk. Put something soft and slow on or simply walk in the quiet and let your thoughts breathe." },
        { label: "REFLECT", text: "Write about one moment recently where you felt truly present in your own life. What made it possible and how can you create more of that?" }
      ],
      invitation: "And when you are ready for your own monthly moment, something beautiful written for your unique energy, to sit with slowly, and to remind you that you are seen, guided and loved..."
    }
  };

  let currentQ = -1;
  let answers = [];
  let selectedIdx = null;
  let selectedType = null;

  function getResult() {
    const counts = { scroll: 0, almost: 0, trying: 0, rising: 0 };
    answers.forEach(a => counts[a]++);
    return Object.entries(counts).sort((a,b) => b[1]-a[1])[0][0];
  }

  function render() {
    const content = document.getElementById('quiz-content');
    content.innerHTML = '';
    if (currentQ === -1) renderIntro(content);
    else if (currentQ >= questions.length) renderResult(content);
    else {
      renderProgress(content);
      renderQuestion(content);
      renderNav(content);
    }
  }

  function renderIntro(content) {
    const card = document.createElement('div');
    card.className = 'card fade-enter';
    card.style.textAlign = 'center';
    card.innerHTML = `
      <span class="intro-icon" style="color:#C9A96E !important; -webkit-text-fill-color:#C9A96E !important;">✦</span>
      <h1 class="intro-title" style="color:#5C4A4A !important; -webkit-text-fill-color:#5C4A4A !important;">What is your honest relationship with time for yourself?</h1>
      <div class="divider" style="margin: 16px auto 20px;">
        <div class="divider-line"></div>
        <span class="divider-star" style="color:#C9A96E !important; -webkit-text-fill-color:#C9A96E !important;">✦</span>
        <div class="divider-line"></div>
      </div>
      <p class="intro-body" style="color:#8B6F6F !important; -webkit-text-fill-color:#8B6F6F !important;">
        Not the version you wish you had.<br>
        Not the version that looks good.<br>
        The real one.<br><br>
        Six honest questions.<br>
        No judgment here. Only recognition.
      </p>
      <span class="intro-note" style="color:#C9A96E !important; -webkit-text-fill-color:#C9A96E !important;">be honest, that is where the magic starts</span>
      <button class="btn-start" onclick="startQuiz()" style="color:white !important; -webkit-text-fill-color:white !important;">I AM READY ✦</button>
    `;
    content.appendChild(card);
  }

  function renderProgress(content) {
    const wrap = document.createElement('div');
    wrap.className = 'progress-wrap fade-enter';
    const pct = (currentQ / questions.length) * 100;
    wrap.innerHTML = `
      <div class="progress-label">question ${currentQ + 1} of ${questions.length}</div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" style="width:${pct}%"></div>
      </div>
    `;
    content.appendChild(wrap);
  }

  function renderQuestion(content) {
    const q = questions[currentQ];
    const card = document.createElement('div');
    card.className = 'card fade-enter';
    const opts = q.options.map((opt, i) => `
      <div class="option ${selectedIdx === i ? 'selected' : ''}" onclick="selectOpt(${i}, '${opt.type}')">
        <div class="option-dot"></div>
        <span class="option-text" style="color:#8B6F6F !important; -webkit-text-fill-color:#8B6F6F !important;">${opt.text}</span>
      </div>
    `).join('');
    card.innerHTML = `
      <span class="question-number" style="color:#C9A96E !important; -webkit-text-fill-color:#C9A96E !important;">✦ question ${currentQ + 1}</span>
      <p class="question-text" style="color:#5C4A4A !important; -webkit-text-fill-color:#5C4A4A !important;">${q.text}</p>
      <div class="options">${opts}</div>
    `;
    content.appendChild(card);
  }

  function renderNav(content) {
    const nav = document.createElement('div');
    nav.className = 'nav-wrap';
    const isLast = currentQ === questions.length - 1;
    nav.innerHTML = `
      ${currentQ > 0 ? '<button class="btn-back" onclick="goBack()">← back</button>' : '<div></div>'}
      <button class="btn-next" onclick="goNext()" ${selectedIdx === null ? 'disabled' : ''}>
        ${isLast ? 'SHOW ME MY RESULT ✦' : 'CONTINUE ✦'}
      </button>
    `;
    content.appendChild(nav);
  }

  function renderResult(content) {
    const type = getResult();
    const r = results[type];

    const suggestionsHTML = r.suggestions.map(s => `
      <div class="suggestion-item">
        <span class="suggestion-star" style="color:#C9A96E !important; -webkit-text-fill-color:#C9A96E !important;">✦</span>
        <div>
          <span class="suggestion-label" style="color:#C9A96E !important; -webkit-text-fill-color:#C9A96E !important;">${s.label}</span>
          <span class="suggestion-text" style="color:#8B6F6F !important; -webkit-text-fill-color:#8B6F6F !important;">${s.text}</span>
        </div>
      </div>
    `).join('');

    const card = document.createElement('div');
    card.className = 'result-card fade-enter';
    card.innerHTML = `
      <span class="result-eyebrow" style="color:#C9A96E !important; -webkit-text-fill-color:#C9A96E !important;">you are...</span>
      <h2 class="result-era" style="color:#A8834A !important; -webkit-text-fill-color:#A8834A !important;">${r.era}</h2>
      <p class="result-tagline" style="color:#8B6F6F !important; -webkit-text-fill-color:#8B6F6F !important;">${r.tagline}</p>
      <div class="divider" style="margin: 0 auto 24px;">
        <div class="divider-line"></div>
        <span class="divider-star" style="color:#C9A96E !important; -webkit-text-fill-color:#C9A96E !important;">✦</span>
        <div class="divider-line"></div>
      </div>
      <p class="result-message" style="color:#5C4A4A !important; -webkit-text-fill-color:#5C4A4A !important;">${r.message}</p>
      <div class="suggestions-box">
        <span class="suggestions-title" style="color:#C9A96E !important; -webkit-text-fill-color:#C9A96E !important;">THREE THINGS TO TRY THIS WEEK</span>
        ${suggestionsHTML}
      </div>
      <div class="invitation-wrap">
        <p class="invitation-text" style="color:#A8834A !important; -webkit-text-fill-color:#A8834A !important;">${r.invitation}</p>
      </div>
      <a href="https://www.patreon.com/cw/IndigoSol" class="btn-subscribe" style="color:white !important; -webkit-text-fill-color:white !important;" target="_blank">
        JOIN INDIGOSOL LETTERS ✦
      </a>
      <button class="btn-retake" onclick="retake()" style="color:#B89A9A !important; -webkit-text-fill-color:#B89A9A !important;">take the quiz again</button>
    `;
    content.appendChild(card);
  }

  function startQuiz() {
    currentQ = 0; answers = []; selectedIdx = null; selectedType = null;
    render();
  }

  function selectOpt(idx, type) {
    selectedIdx = idx; selectedType = type;
    if (answers[currentQ] !== undefined) answers[currentQ] = type;
    else answers.push(type);
    render();
  }

  function goNext() {
    if (selectedIdx === null) return;
    currentQ++; selectedIdx = null; selectedType = null;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function goBack() {
    currentQ--; answers.pop(); selectedIdx = null; selectedType = null;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function retake() {
    currentQ = -1; answers = []; selectedIdx = null; selectedType = null;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  render();
</script>

</body>
</html>
